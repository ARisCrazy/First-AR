<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
  </head>

  

  <body>
<!-- mindar-image="imageTargetSrc: ./assets/targets3.mind;" -->
    <a-scene
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
      
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <a-assets>
        <a-asset-item
          id="watch"
          src="./assets/apple_watch_ultra_2.glb">
        </a-asset-item>
      </a-assets>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0" >

        <!-- <a-gltf-model
          src="#watch"
          position="0 0 0"
          scale="35 35 35">
        </a-gltf-model> -->

        <a-gltf-model
  src="#watch"
  position="0 0 0"
  scale="25 25 25"
  rotation="0 0 0"
  >
</a-gltf-model>

      </a-entity>

      <a-light type="ambient" intensity="1"></a-light>

      <a-light
        type="directional"
        position="0 1 1">
      </a-light>

    </a-scene>
    <div style="position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 999;">

  <button onclick="zoomIn()">Zoom In</button>

  <button onclick="zoomOut()">Zoom Out</button>

  <button onclick="rotateLeft()">⟲</button>

  <button onclick="rotateRight()">⟳</button>

</div>

    <script>

const model = document.querySelector("a-gltf-model");

let scale = 25;
let rotation = 0;

function zoomIn() {
  scale += 5;
  model.setAttribute("scale", `${scale} ${scale} ${scale}`);
}

function zoomOut() {
  scale -= 5;

  if (scale < 1) {
    scale = 1;
  }

  model.setAttribute("scale", `${scale} ${scale} ${scale}`);
}

function rotateLeft() {
  rotation -= 15;
  model.setAttribute("rotation", `0 ${rotation} 0`);
}

function rotateRight() {
  rotation += 15;
  model.setAttribute("rotation", `0 ${rotation} 0`);
}

</script>

  </body>
</html>
