
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <!-- <a-scene mindar-image="imageTargetSrc: ./assets/targets (1).mind" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"> -->
      <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
       <a-assets>
  <a-asset-item id="watch" src="./assets/scene.gltf"></a-asset-item>
</a-assets>

<a-entity mindar-image-target="targetIndex: 0">

  <a-gltf-model
    src="#watch"
    position="0 0 0"
    scale="0.1 0.1 0.1">
  </a-gltf-model>

</a-entity>

<a-light type="ambient" intensity="1"></a-light>
<a-light type="directional" position="0 1 1"></a-light>
    </a-scene>
  </body>
</html>
