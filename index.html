<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
  </head>

  

  <body>
<!-- mindar-image="imageTargetSrc: ./assets/targets3.mind;" -->
    <a-scene
    mindar-image="imageTargetSrc: ./assets/targets (1).mind"
      
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <a-assets>
        <a-asset-item id="apple"
    src="./assets/ultra2.glb">
  </a-asset-item>

  <a-asset-item id="casio"
    src="./assets/casio.glb">
  </a-asset-item>

  <a-asset-item id="rolex"
    src="./assets/rolex.glb">
  </a-asset-item>

  <a-asset-item id="tissot"
    src="./assets/tissot.glb">
  </a-asset-item>
        
      </a-assets>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

<a-entity
  id="mainModel"
  gltf-model="#apple"
  position="0 0 0"
  rotation="0 0 0"
  scale="25 25 25">
</a-entity>

<!-- <a-entity
  id="casioModel"
  gltf-model="#casio"
  position="-1.5 0 0"
  scale="1 1 1">
</a-entity>

<a-entity
  id="rolexModel"
  gltf-model="#rolex"
  position="1.3 0 0"
  scale="1 1 1">
</a-entity>

<a-entity
  id="tissotModel"
  gltf-model="#tissot"
  position="4 0 0"
  scale="1 1 1">
</a-entity> -->
</a-entity>

      <a-light type="ambient" intensity="1"></a-light>

      <a-light
        type="directional"
        position="0 1 1">
      </a-light>

    </a-scene>
    <div style="
position: fixed;
bottom: 20px;
width: 100%;
display: flex;
justify-content: center;
gap: 10px;
z-index: 999;
overflow-x: auto;
padding: 10px;
">

<!-- <button onclick="changeModel('apple')">Apple</button> -->


<button onclick="changeModel('apple')">Apple</button>

<button onclick="changeModel('casio')">Casio</button>

<button onclick="changeModel('rolex')">Rolex</button>

<button onclick="changeModel('tissot')">Tissot</button>

      

</div>
    <div style="position: fixed; bottom: 90px; width: 100%; text-align: center; z-index: 999;">

  <button onclick="zoomIn()">Zoom In</button>

  <button onclick="zoomOut()">Zoom Out</button>

  <button onclick="rotateLeft()">⟲</button>

  <button onclick="rotateRight()">⟳</button>

</div>

<script>

const model = document.querySelector("#mainModel");


let currentModel = "apple";

const modelScales = {
  apple: 25,
  casio: 0.1,
  rolex: 0.1,
  tissot: 0.1
};

let rotation = 0;

function changeModel(modelId) {

  currentModel = modelId;

  model.setAttribute(
    "gltf-model",
    `#${modelId}`
  );

  const s = modelScales[modelId];

  model.setAttribute(
    "scale",
    `${s} ${s} ${s}`
  );

}

function zoomIn() {

  modelScales[currentModel] += 1;

  const s = modelScales[currentModel];

  model.setAttribute(
    "scale",
    `${s} ${s} ${s}`
  );

}

function zoomOut() {

  modelScales[currentModel] -= 1;
  if(modelScales[currentModel] < 0.01) {
    modelScales[currentModel] = 0.01;
  }

  const s = modelScales[currentModel];

  model.setAttribute(
    "scale",
    `${s} ${s} ${s}`
  );

}

function rotateLeft() {

  rotation -= 15;

  model.setAttribute(
    "rotation",
    `0 ${rotation} 0`
  );

}

function rotateRight() {

  rotation += 15;

  model.setAttribute(
    "rotation",
    `0 ${rotation} 0`
  );

}

</script>

  </body>
</html>
